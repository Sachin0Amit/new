root = "."
tmp_dir = "bin"

[build]
  bin = "./bin/sovereign"
  cmd = "go build -o ./bin/sovereign ./cmd/sovereign/main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "web/dist"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_regex = ["_test.go"]
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
