<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign | Unified Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="desktop.css">
    <link rel="stylesheet" href="../cursor.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="desktop-workspace">
        <!-- Background Layer (Three.js could be added here) -->
        
        <!-- Taskbar -->
        <nav class="taskbar glass-panel">
            <div class="taskbar-item" onclick="window.spawnWindow('terminal')" title="Intel Terminal">
                <i data-lucide="terminal"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('fleet')" title="Fleet Matrix">
                <i data-lucide="network"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('sensory')" title="Sensory Viewport">
                <i data-lucide="eye"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('logs')" title="System Logs">
                <i data-lucide="activity"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('audit')" title="Reasoning Visualizer">
                <i data-lucide="microscope"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('mesh')" title="Mesh Knowledge Navigator">
                <i data-lucide="globe"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('reflex')" title="Reflex Monitor">
                <i data-lucide="zap"></i>
            </div>
            <div class="taskbar-item" onclick="window.spawnWindow('fleet')" title="Global Fleet Matrix">
                <i data-lucide="layers"></i>
            </div>
            <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px;"></div>
            <div class="taskbar-item" onclick="window.location.href='../index.html'" title="Exit to Hub">
                <i data-lucide="log-out"></i>
            </div>
        </nav>
    </div>

    <script type="module">
        import WindowManager from './WindowManager.js';
        import { animate, spring } from "https://cdn.jsdelivr.net/npm/motion/+esm";
        import SovereignCursor from '../Cursor.js';

        // Expose to window for WindowManager to consume
        window.animateMotion = animate;
        window.springMotion = spring;

        const wm = new WindowManager();
        const ws = new WebSocket(`ws://${window.location.host}/ws/telemetry`);

        // --- GLOBAL WINDOW SPAWNING ---
        window.spawnWindow = (type) => {
            switch(type) {
                case 'terminal':
                    wm.createWindow('win-terminal', 'Intel Terminal', `
                        <div class="terminal-view" style="font-family: monospace; color: #00FF00;">
                            <div>[SYSTEM] Local Core Alpha Synced.</div>
                            <div style="color: #888;">> Waiting for operative input...</div>
                        </div>
                    `, { width: '500px', height: '350px' });
                    break;
                case 'fleet':
                    wm.createWindow('win-fleet', 'Fleet Matrix', `
                        <div class="matrix-view">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span>Core Alpha</span> <span style="color: #00FF00;">ONLINE</span>
                            </div>
                            <div style="background: rgba(255,255,255,0.05); height: 100px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                                Mesh Synchronization: 100%
                            </div>
                        </div>
                    `, { width: '400px', height: '250px', left: '600px' });
                    break;
                case 'logs':
                    wm.createWindow('win-logs', 'System Logs', `
                        <div id="log-feed" style="font-family: monospace; font-size: 0.75rem;">
                            <div style="color: #555;">[00:00:00] Initializing telemetry stream...</div>
                        </div>
                    `, { width: '600px', height: '400px', top: '400px' });
                    break;
                case 'audit':
                    wm.createWindow('win-audit', 'Reasoning Visualizer', `
                        <div class="audit-timeline" id="audit-feed" style="position: relative; padding-left: 20px; border-left: 2px solid var(--sov-accent);">
                            <div style="color: #8E7CC3; margin-bottom: 20px;">[REASONING INITIALIZED] Waiting for cognitive event...</div>
                        </div>
                    `, { width: '450px', height: '500px', left: '1000px' });
                    break;
                case 'mesh':
                    wm.createWindow('win-mesh', 'Mesh Navigator', `
                        <div class="mesh-view" style="height:100%; display:flex; flex-direction:column; gap:10px;">
                            <div style="flex:1; background:rgba(255,255,255,0.05); border-radius:8px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
                                <div style="position:absolute; width:100px; height:100px; background:radial-gradient(circle, var(--sov-accent) 0%, transparent 70%); filter:blur(20px); opacity:0.3;"></div>
                                <span style="font-size:0.75rem; color:var(--sov-text-muted)">Visualizing Global Vector Space...</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem;">
                                <span>Active Nodes: 2</span>
                                <span>Global Vectors: 1,248</span>
                            </div>
                        </div>
                    `, { width: '400px', height: '300px', top: '100px', left: '50px' });
                    break;
                case 'reflex':
                    wm.createWindow('win-reflex', 'Reflex Monitor', `
                        <div class="reflex-container" style="display:flex; flex-direction:column; height:100%;">
                            <div class="reflex-header" style="padding:10px; border-bottom:1px solid rgba(255,215,0,0.1); background:rgba(255,215,0,0.02); display:flex; justify-content:space-between; align-items:center;">
                                <div style="color:#FFD700; font-size:0.7rem; font-weight:700; display:flex; align-items:center; gap:5px;">
                                    <i data-lucide="zap" style="width:12px;"></i> AUTONOMOUS REFLEX ACTIVE
                                </div>
                                <div id="reflex-stats" style="font-size:0.6rem; color:#888;">0 DETECTIONS</div>
                            </div>
                            <div class="reflex-view" id="reflex-feed" style="flex:1; overflow-y:auto; padding:10px; font-family: 'Inter', sans-serif; font-size: 0.75rem;">
                                <div style="color: #666; text-align:center; margin-top:50px;">
                                    <i data-lucide="shield-check" style="width:24px; margin-bottom:10px; opacity:0.3;"></i><br>
                                    HEARTBEAT NOMINAL. NO ANOMALIES DETECTED.
                                </div>
                            </div>
                        </div>
                    `, { width: '450px', height: '400px', top: '500px', left: '1100px' });
                    setTimeout(() => lucide.createIcons(), 100);
                    break;
                case 'fleet':
                    wm.createWindow('win-fleet', 'Global Fleet Matrix', `
                        <div class="fleet-matrix" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; padding:10px;">
                            <div class="fleet-node" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; border-top:2px solid var(--sov-accent);">
                                <div style="font-weight:700; color:var(--sov-accent); font-size:0.7rem;">NODE: ALPHA (LOCAL)</div>
                                <div style="font-size:1.2rem; margin:10px 0;">42% GRAVITY</div>
                                <div class="progress-bar" style="height:4px; background:rgba(255,255,255,0.1); border-radius:2px;">
                                    <div style="width:42%; height:100%; background:var(--sov-accent);"></div>
                                </div>
                            </div>
                            <div class="fleet-node" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; opacity:0.6;">
                                <div style="font-weight:700; color:#888; font-size:0.7rem;">NODE: BETA (REMOTE)</div>
                                <div style="font-size:1.2rem; margin:10px 0;">12% GRAVITY</div>
                                <div class="progress-bar" style="height:4px; background:rgba(255,255,255,0.1); border-radius:2px;">
                                    <div style="width:12%; height:100%; background:#4ECDC4;"></div>
                                </div>
                            </div>
                        </div>
                    `, { width: '500px', height: '350px', top: '50px', left: '500px' });
                    break;
            }
        };

        // --- TELEMETRY BROADCAST HANDLING ---
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const logFeed = document.getElementById('log-feed');
            
            if (logFeed) {
                const entry = document.createElement('div');
                const timeStr = new Date(msg.timestamp).toLocaleTimeString();
                entry.innerHTML = `<span style="color: #8E7CC3;">[${timeStr}]</span> ${msg.type}: ${JSON.stringify(msg.payload).substring(0, 100)}...`;
                logFeed.appendChild(entry);
                logFeed.scrollTop = logFeed.scrollHeight;
            }

            if (msg.type === 'TASK') {
                const auditFeed = document.getElementById('audit-feed');
                if (auditFeed && msg.payload.result && msg.payload.result.audit_trail) {
                    auditFeed.innerHTML = '<h3 style="margin-bottom:15px; font-size:0.9rem;">Trace: ' + msg.payload.id + '</h3>';
                    msg.payload.result.audit_trail.forEach(step => {
                        const s = document.createElement('div');
                        s.style.marginBottom = '12px';
                        s.innerHTML = `
                            <div style="font-weight:700; font-size:0.75rem; color:var(--sov-accent)">${step.stage}</div>
                            <div style="font-size:0.85rem;">${step.action}</div>
                            <div style="font-size:0.7rem; color:var(--sov-text-muted)">${new Date(step.timestamp).toLocaleTimeString()}</div>
                        `;
                        auditFeed.appendChild(s);
                    });
                }
            }

            // Global Telemetry updates
            if (msg.type === 'METRICS') {
                if (msg.payload.event === 'REFLEX') {
                    const reflexFeed = document.getElementById('reflex-feed');
                    if (reflexFeed) {
                        // Clear welcome message on first entry
                        if (reflexFeed.querySelector('.shield-check') || reflexFeed.innerHTML.includes('NOMINAL')) {
                            reflexFeed.innerHTML = '';
                        }

                        const entry = document.createElement('div');
                        entry.className = 'reflex-entry';
                        entry.style.padding = '12px';
                        entry.style.marginBottom = '12px';
                        entry.style.background = 'rgba(255, 215, 0, 0.03)';
                        entry.style.border = '1px solid rgba(255, 215, 0, 0.1)';
                        entry.style.borderRadius = '8px';
                        entry.style.borderLeft = '3px solid #FFD700';
                        
                        const timeStr = new Date(msg.timestamp).toLocaleTimeString();
                        
                        entry.innerHTML = `
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span style="color: #FFD700; font-weight:700; font-size:0.65rem; text-transform:uppercase;">${msg.payload.validator || 'REFLEX'} TRIGGERED</span>
                                <span style="color: #888; font-size:0.6rem;">${timeStr}</span>
                            </div>
                            <div style="color: #eee; margin-bottom:10px; font-weight:500;">Anomaly Detected: <span style="color:#FFB100;">${msg.payload.reason}</span></div>
                            
                            <div style="background:rgba(0,0,0,0.2); padding:8px; border-radius:4px; margin-bottom:10px; border:1px dashed rgba(255,255,255,0.05);">
                                <div style="color:#888; font-size:0.6rem; margin-bottom:4px; font-weight:700;">STRATEGY APPLIED (DEPTH: ${msg.payload.depth})</div>
                                <div style="color:#A4CCF4; font-size:0.7rem; font-style:italic;">"${msg.payload.correction}"</div>
                            </div>

                            <div style="display:flex; align-items:center; gap:10px; font-size:0.6rem; color:#666;">
                                <span>TASK ID: ${msg.payload.task_id.substring(0, 8)}...</span>
                                <div style="flex:1; height:1px; background:rgba(255,255,255,0.05);"></div>
                                <span style="color:#FFD700;">RECOVERY IN PROGRESS</span>
                            </div>
                        `;
                        reflexFeed.prepend(entry);
                        
                        // Update Stats
                        const stats = document.getElementById('reflex-stats');
                        if (stats) {
                            const count = reflexFeed.querySelectorAll('.reflex-entry').length;
                            stats.innerText = `${count} DETECTIONS`;
                        }

                        // Animate entry
                        animate(entry, 
                            { opacity: [0, 1], x: [20, 0] },
                            { duration: 0.5, easing: spring({ stiffness: 100, damping: 15 }) }
                        );

                        // Spectral Pulse if not already active
                        const glowTag = 'reflex-glow-active';
                        if (!reflexFeed.classList.contains(glowTag)) {
                            reflexFeed.classList.add(glowTag);
                            animate(".win-reflex", 
                                { boxShadow: ["0 0 0px rgba(255,215,0,0)", "0 0 20px rgba(255,215,0,0.2)", "0 0 0px rgba(255,215,0,0)"] },
                                { duration: 2, repeat: Infinity, easing: "ease-in-out" }
                            );
                        }
                    }
                }
            }
        };

        ws.onopen = () => console.log("Sovereign Telemetry Stream: CONNECTED");
        ws.onclose = () => console.log("Sovereign Telemetry Stream: DISCONNECTED");

        // Initial Layout
        document.addEventListener('DOMContentLoaded', () => {
            new SovereignCursor();
            window.spawnWindow('logs');
            window.spawnWindow('terminal');
        });
    </script>
</body>
</html>
