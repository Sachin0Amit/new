<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status & Connectivity Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #0ff;
            padding: 2rem;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #0ff;
            padding-bottom: 1rem;
        }
        
        h1 {
            font-size: 2rem;
            text-shadow: 0 0 10px #0ff;
        }
        
        .section {
            margin-bottom: 2rem;
            background: rgba(0, 255, 255, 0.05);
            border-left: 3px solid #0ff;
            padding: 1.5rem;
            border-radius: 4px;
        }
        
        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #0f0;
        }
        
        .status-check {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .check-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }
        
        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .status-icon.checking {
            background: #ff9800;
            animation: pulse 1s infinite;
        }
        
        .status-icon.ok {
            background: #0f0;
            color: #000;
        }
        
        .status-icon.error {
            background: #f00;
            color: #fff;
        }
        
        .check-name {
            flex: 1;
        }
        
        .check-time {
            color: #666;
            font-size: 0.9rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        button {
            padding: 0.75rem 1.5rem;
            background: #0ff;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
        }
        
        .log {
            background: #000;
            border: 1px solid #0ff;
            padding: 1rem;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.9rem;
        }
        
        .log-entry {
            margin-bottom: 0.25rem;
            padding: 0.25rem 0;
        }
        
        .log-ok { color: #0f0; }
        .log-error { color: #f00; }
        .log-info { color: #0ff; }
        
        footer {
            text-align: center;
            margin-top: 3rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>◈ SOVEREIGN INTELLIGENCE CORE</h1>
            <p>System Status & Connectivity Check</p>
        </header>
        
        <div class="section">
            <h2>🔍 Service Health Check</h2>
            <div class="status-check" id="statusCheck"></div>
            <div class="button-group">
                <button onclick="runHealthCheck()">🔄 Refresh Status</button>
                <button onclick="openDashboard()">📊 Open Dashboard</button>
            </div>
        </div>
        
        <div class="section">
            <h2>🌐 API Connectivity</h2>
            <div class="log" id="logOutput"></div>
            <div class="button-group">
                <button onclick="testAPI()">🧪 Test API</button>
                <button onclick="testWebSocket()">🔗 Test WebSocket</button>
            </div>
        </div>
        
        <div class="section">
            <h2>🚀 Quick Access</h2>
            <div class="button-group" style="grid-template-columns: 1fr;">
                <button onclick="window.location.href='index-pro.html'">→ Dashboard</button>
            </div>
            <div class="button-group" style="margin-top: 1rem;">
                <button onclick="window.location.href='chat.html'">💬 Chat</button>
                <button onclick="window.location.href='src/finance-pro.html'">📈 Trading</button>
                <button onclick="window.location.href='command-center.html'">⚙️ Control</button>
                <button onclick="window.location.href='admin.html'">🔐 Admin</button>
            </div>
        </div>
        
        <footer>
            <p>Sovereign Intelligence Core v1.2.0 | Status Page</p>
        </footer>
    </div>
    
    <script>
        const API_URL = `${location.protocol}//${location.hostname}:8081`;
        const WS_URL = `ws://${location.hostname}:8081`;
        
        function log(message, type = 'info') {
            const logOutput = document.getElementById('logOutput');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logOutput.appendChild(entry);
            logOutput.scrollTop = logOutput.scrollHeight;
        }
        
        function createStatusItem(name, status) {
            const item = document.createElement('div');
            item.className = 'check-item';
            
            const icon = document.createElement('div');
            icon.className = `status-icon ${status}`;
            if (status === 'checking') icon.textContent = '...';
            else if (status === 'ok') icon.textContent = '✓';
            else if (status === 'error') icon.textContent = '✗';
            
            const label = document.createElement('div');
            label.className = 'check-name';
            label.textContent = name;
            
            const time = document.createElement('div');
            time.className = 'check-time';
            time.textContent = new Date().toLocaleTimeString();
            
            item.appendChild(icon);
            item.appendChild(label);
            item.appendChild(time);
            
            return item;
        }
        
        async function runHealthCheck() {
            const statusCheck = document.getElementById('statusCheck');
            statusCheck.innerHTML = '';
            
            const checks = [
                { name: 'Sovereign Core API', endpoint: `${API_URL}/health` },
                { name: 'Ollama LLM Server', endpoint: `http://localhost:11434/api/tags` },
                { name: 'Prometheus Metrics', endpoint: `http://localhost:9090/-/healthy` },
                { name: 'Grafana Dashboards', endpoint: `http://localhost:3000/api/health` }
            ];
            
            for (const check of checks) {
                const item = createStatusItem(check.name, 'checking');
                statusCheck.appendChild(item);
                
                try {
                    const response = await fetch(check.endpoint, { method: 'HEAD', mode: 'no-cors' });
                    const icon = item.querySelector('.status-icon');
                    icon.className = 'status-icon ok';
                    icon.textContent = '✓';
                    log(`✓ ${check.name} is operational`, 'ok');
                } catch (error) {
                    const icon = item.querySelector('.status-icon');
                    icon.className = 'status-icon error';
                    icon.textContent = '✗';
                    log(`✗ ${check.name} check failed`, 'error');
                }
            }
        }
        
        async function testAPI() {
            log('Testing API connectivity...', 'info');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                log(`API Response: ${JSON.stringify(data)}`, 'ok');
                log('✓ API is responding correctly', 'ok');
            } catch (error) {
                log(`✗ API Error: ${error.message}`, 'error');
            }
        }
        
        function testWebSocket() {
            log('Attempting WebSocket connection...', 'info');
            try {
                const ws = new WebSocket(`${WS_URL}/ws/chat`);
                
                ws.onopen = () => {
                    log('✓ WebSocket connection established', 'ok');
                    log('Sending test message...', 'info');
                    ws.send(JSON.stringify({
                        type: 'message',
                        content: 'Test message from status check'
                    }));
                    setTimeout(() => ws.close(), 2000);
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`WebSocket message received: ${data.type}`, 'ok');
                    } catch {
                        log(`WebSocket data: ${event.data}`, 'info');
                    }
                };
                
                ws.onerror = (error) => {
                    log(`✗ WebSocket Error: ${error}`, 'error');
                };
                
                ws.onclose = () => {
                    log('WebSocket connection closed', 'info');
                };
            } catch (error) {
                log(`✗ WebSocket Error: ${error.message}`, 'error');
            }
        }
        
        function openDashboard() {
            window.location.href = 'index-pro.html';
        }
        
        // Auto-run checks on page load
        window.addEventListener('load', () => {
            log('System status check started...', 'info');
            runHealthCheck();
        });
    </script>
</body>
</html>
