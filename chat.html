<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PapiAi Pro | Sovereign Intelligence</title>
    <meta name="description" content="PapiAi Pro - Premium local AI chat with Titan inference engine. 100% private, zero cloud.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231D1D1D'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23fff' font-family='serif' font-size='20' font-weight='700'>P</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="cursor.css">
</head>
<body class="pro-app">
    <div id="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="pro-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo-text" style="text-decoration:none;color:inherit;">Sovereign <span>Intel</span></a>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" id="new-chat">
                    <span class="icon">+</span> New Chat
                </button>
                <div class="nav-section">Recent Intelligence</div>
                <div class="history-list" id="history-list">
                    <!-- Dynamic history items populated from localStorage -->
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" onclick="window.toggleSovereignSettings()">
                    <span class="icon">⚙</span> Settings
                </button>
                <button class="nav-item" onclick="window.toggleSovereignLogin()">
                    <span class="icon">🔑</span> Login
                </button>
                <a href="index.html" class="nav-item" style="text-decoration:none;color:inherit;">
                    <span class="icon">←</span> Home
                </a>
                <div class="user-status">
                    <div class="status-indicator"></div>
                    Sovereign System Active
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-viewport">
            <!-- Background Visualizer -->
            <div id="pro-visualizer"></div>

            <header class="chat-header">
                <div class="model-info">
                    <span class="badge">SOVEREIGN</span>
                    <select id="model-selector" class="model-select">
                        <option value="local">Sovereign-MLA (Compact)</option>
                        <option value="mid">Sovereign-MLA (Balanced)</option>
                        <option value="max">Sovereign-MLA (Extreme)</option>
                        <option value="prime" selected>Sovereign-Prime (High-Fidelity)</option>
                        <option value="mist">Sovereign-Mist (Long-Context)</option>
                        <option value="phi">Sovereign-Phi (Edge-Optimized)</option>
                    </select>
                </div>
                <div class="header-actions">
                    <button class="action-btn" id="export-btn" title="Export conversation">Export</button>
                    <button class="action-btn" onclick="window.location.href='chat-simple.html'" title="Simple mode">Simple Mode</button>
                </div>
            </header>

            <section class="messages-container" id="messages">
                <div class="welcome-hero">
                    <h1>Initiate Local Derivation</h1>
                    <p>Enter your query into the Sovereign Core for hardware-accelerated local inference.</p>
                    <div class="quick-prompts">
                        <button class="quick-prompt" data-prompt="Derive the Taylor expansion of e^x cos(x)">Taylor Expansion</button>
                        <button class="quick-prompt" data-prompt="Explain the architecture of the Sovereign Intelligence Core">System Architecture</button>
                        <button class="quick-prompt" data-prompt="What mathematical proofs can you verify?">Proof Verification</button>
                    </div>
                </div>
            </section>

            <footer class="input-container">
                <div class="input-wrapper">
                    <textarea id="chat-textarea" placeholder="Message Sovereign Intelligence..." rows="1"></textarea>
                    <div class="input-tools">
                        <button class="tool-btn" title="Hardware Settings" onclick="window.toggleSovereignSettings()">⚙</button>
                        <button class="tool-btn" title="Local Attachments">+</button>
                        <span class="char-count" id="char-count"></span>
                        <button id="send-btn" class="send-btn" title="Send (Enter)">↑</button>
                    </div>
                </div>
                <div class="privacy-note">
                    🔒 All data is processed strictly locally on your machine via the Titan Engine.
                </div>
            </footer>
        </main>
    </div>

    <!-- Scripts - Using consistent Three.js version -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script type="module" src="settings.js"></script>
    <script type="module" src="login.js"></script>
    <script type="module" src="chat.js"></script>
</body>
</html>
