"<!DOCTYPE html>

<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>PapiAI - Sovereign Intelligence Core</title>
    <link rel='stylesheet' href='styles/main.css'>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap' rel='stylesheet'>
</head>
<body>
    <div class='app-container'>
        <!-- Sidebar -->
        <aside class='sidebar'>
            <div class='sidebar-header'>
                <h1 class='logo'>⚛️ PapiAI</h1>
                <button class='icon-btn' id='new-session-btn' title='New Session'>＋</button>
            </div>
            
            <div class='search-box'>
                <input type='text' id='session-search' placeholder='Search conversations...'>
            </div>
            
            <nav class='sidebar-nav' id='sessions-list'>
                <!-- Sessions will be populated here -->
            </nav>
            
            <div class='sidebar-footer'>
                <button class='btn-primary' id='settings-btn'>⚙️ Settings</button>
            </div>
        </aside>
        
        <!-- Main Chat Area -->
        <main class='chat-container'>
            <div class='chat-header'>
                <div class='status-indicator'>
                    <span class='status-dot active'></span>
                    <span class='status-text'>Sovereign Intelligence Active</span>
                </div>
                <div class='model-selector'>
                    <select id='model-select'>
                        <option value='llama3.2'>Llama 3.2</option>
                        <option value='mistral'>Mistral 7B</option>
                        <option value='phi3'>Phi-3</option>
                    </select>
                </div>
            </div>
            
            <div class='messages-container' id='messages-container'>
                <div class='welcome-message'>
                    <div class='avatar'>⚛️</div>
                    <div class='message-content'>
                        <div class='message-text'>Welcome to PapiAI - Your Sovereign Intelligence Assistant</div>
                        <div class='message-hint'>How can I help you today?</div>
                    </div>
                </div>
            </div>
            
            <div class='input-container'>
                <div class='input-wrapper'>
                    <button class='icon-btn input-btn' id='voice-input-btn' title='Voice Input'>🎙️</button>
                    <textarea 
                        id='message-input' 
                        placeholder='Type your command or ask a question...'
                        rows='1'
                    ></textarea>
                    <button class='icon-btn send-btn' id='send-btn' title='Send'>→</button>
                </div>
                <div class='input-hint'>
                    <span>⌘ Enter to send</span>
                    <span>↑ ↓ to navigate</span>
                    <span>🎙️ Voice input</span>
                </div>
            </div>
        </main>
        
        <!-- Tool Visualization Panel -->
        <aside class='tool-panel'>
            <div class='tool-header'>
                <h3>📋 Current Action</h3>
            </div>
            <div class='tool-content' id='tool-content'>
                <div class='tool-placeholder'>No active tool execution</div>
            </div>
        </aside>
    </div>
    
    <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
    <script src='scripts/chat.js'></script>
</body>
</html>"
